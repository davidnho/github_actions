name: Run Tests

on:
  push:
    branches: [main]          # Only trigger on pushes to 'main'
  pull_request:               # Also trigger on any pull request

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4     # Downloads your repo onto the machine

      - name: Set up Node.js
        uses: actions/setup-node@v4   # Installs Node.js
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
